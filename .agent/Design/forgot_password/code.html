<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - Project Polaris</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#a9a7ff",
                        "tertiary-fixed": "#ffdbca",
                        "secondary-fixed-dim": "#6bd8cb",
                        "on-primary-fixed": "#0f0069",
                        "on-background": "#0b1c30",
                        "secondary": "#006a61",
                        "primary": "#1f108e",
                        "on-primary-fixed-variant": "#3b35a7",
                        "background": "#f8f9ff",
                        "primary-container": "#3730a3",
                        "surface-dim": "#cbdbf5",
                        "surface-container-low": "#eff4ff",
                        "surface": "#f8f9ff",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "outline": "#777584",
                        "on-secondary-fixed": "#00201d",
                        "tertiary": "#4f1e00",
                        "tertiary-fixed-dim": "#ffb690",
                        "tertiary-container": "#722f00",
                        "on-secondary-fixed-variant": "#005049",
                        "surface-container": "#e5eeff",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-surface-variant": "#464553",
                        "on-tertiary-fixed-variant": "#783200",
                        "surface-bright": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#89f5e7",
                        "on-secondary-container": "#006f66",
                        "surface-container-highest": "#d3e4fe",
                        "on-tertiary-fixed": "#341100",
                        "surface-tint": "#544fc0",
                        "on-tertiary-container": "#ff9559",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e2dfff",
                        "secondary-container": "#86f2e4",
                        "inverse-on-surface": "#eaf1ff",
                        "inverse-surface": "#213145",
                        "outline-variant": "#c8c4d5",
                        "on-surface": "#0b1c30",
                        "on-error": "#ffffff",
                        "inverse-primary": "#c3c0ff",
                        "surface-variant": "#d3e4fe",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#dce9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "margin": "32px",
                        "sm": "12px",
                        "gutter": "24px",
                        "xl": "64px",
                        "lg": "40px",
                        "xs": "4px",
                        "md": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Lexend"],
                        "h2": ["Plus Jakarta Sans"],
                        "body-sm": ["Lexend"],
                        "button": ["Plus Jakarta Sans"],
                        "h3": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"],
                        "body-lg": ["Lexend"],
                        "label-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "h2": ["32px", { "lineHeight": "1.25", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "button": ["16px", { "lineHeight": "1", "fontWeight": "600" }],
                        "h3": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "h1": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-body-md text-body-md text-on-surface">
<!-- Ambient Background Elements for Glassmorphic Depth -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed-dim/30 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-secondary-fixed/20 blur-[100px] pointer-events-none"></div>
<!-- Main Card Container (Glassmorphic) -->
<main class="w-full max-w-lg bg-surface/80 backdrop-blur-xl border border-outline-variant/40 rounded-xl p-8 md:p-12 shadow-[0_8px_30px_rgb(55,48,163,0.08)] relative z-10 flex flex-col">
<!-- Header Section -->
<div class="text-center mb-10 flex flex-col items-center">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-weight="fill">lock_reset</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface mb-2">Reset Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">Follow the steps below to securely regain access to your account.</p>
</div>
<!-- Multi-Step Progress Indicator -->
<div class="relative flex items-center justify-between mb-12 px-2">
<!-- Background Track -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[2px] bg-outline-variant/30 z-0"></div>
<!-- Active Track (Step 1 to 2 conceptually) -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-[10%] h-[2px] bg-primary z-0 transition-all duration-500"></div>
<!-- Step 1: Email (Active) -->
<div class="relative z-10 flex flex-col items-center gap-2 bg-surface/0">
<div class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-label-md shadow-md ring-4 ring-primary-fixed">1</div>
<span class="font-label-md text-label-md text-primary absolute -bottom-7 whitespace-nowrap">Email</span>
</div>
<!-- Step 2: OTP (Inactive) -->
<div class="relative z-10 flex flex-col items-center gap-2 bg-surface p-1 rounded-full">
<div class="w-8 h-8 rounded-full bg-surface border-2 border-outline-variant text-on-surface-variant flex items-center justify-center font-label-md text-label-md transition-colors">2</div>
<span class="font-body-sm text-body-sm text-on-surface-variant absolute -bottom-6 whitespace-nowrap">Verify Code</span>
</div>
<!-- Step 3: New Password (Inactive) -->
<div class="relative z-10 flex flex-col items-center gap-2 bg-surface p-1 rounded-full">
<div class="w-8 h-8 rounded-full bg-surface border-2 border-outline-variant text-on-surface-variant flex items-center justify-center font-label-md text-label-md transition-colors">3</div>
<span class="font-body-sm text-body-sm text-on-surface-variant absolute -bottom-6 whitespace-nowrap">New Password</span>
</div>
</div>
<!-- Step 1 Form Area -->
<div class="flex-grow flex flex-col justify-center">
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="emailInput">University Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-DEFAULT pl-12 pr-4 py-3 font-body-md text-body-md text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all placeholder:text-outline-variant shadow-sm" id="emailInput" placeholder="e.g., student@university.edu" required="" type="email"/>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-button text-button py-3 px-6 rounded-DEFAULT shadow-[0_2px_4px_rgba(31,16,142,0.2)] hover:bg-gradient-to-r hover:from-primary hover:to-secondary transition-all duration-300 active:translate-y-[1px] flex items-center justify-center gap-2 group" type="button">
                        Send Verification Code
                        <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Footer Actions -->
<div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<a class="inline-flex items-center gap-2 font-label-md text-label-md text-outline hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                Return to Sign In
            </a>
</div>
</main>
</body></html>
